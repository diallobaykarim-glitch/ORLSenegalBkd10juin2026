services:
  # Oracle Database
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db-senegal
    environment:
      ORACLE_PASSWORD: oracle
    ports:
      - "1523:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "sqlplus", "-l", "system/oracle@XE", "as", "sysdba", "select", "1", "from", "dual"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: api-senegal
    environment:
      DB_USER: SYSTEM
      DB_PASSWORD: oracle
      DB_HOST: oracle-db
      DB_PORT: 1521
      DB_SERVICE: XE
    ports:
      - "8001:8000"
    depends_on:
      oracle-db:
        condition: service_healthy
    volumes:
      - ./api:/app/api
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Streamlit Dashboard
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: dashboard-senegal
    environment:
      DB_USER: SYSTEM
      DB_PASSWORD: oracle
      DB_HOST: oracle-db
      DB_PORT: 1521
      DB_SERVICE: XE
    ports:
      - "8502:8501"
    depends_on:
      - oracle-db
      - api
    volumes:
      - ./dashboard:/app/dashboard
    networks:
      - app-network
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  oracle_data:

networks:
  app-network:
    driver: bridge
